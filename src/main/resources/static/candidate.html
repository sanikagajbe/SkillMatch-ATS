<!DOCTYPE html>
<html>
<head>
    <title>Candidate Application Portal</title>
    <style> body { font-family: sans-serif; padding: 20px; } form { max-width: 400px; margin: auto; } </style>
</head>
<body>
<form id="applyForm">
    <h2>Submit Your Profile</h2>
    <label>Full Name:</label><br>
    <input type="text" id="candidateName" required style="width: 100%; padding: 5px;"><br><br>

    <label>Select Your Skills (Hold Ctrl/Cmd to select multiple):</label><br>
    <select id="candidateSkills" multiple style="width: 100%; height: 150px;">
        <option value="Java">Java</option>
        <option value="Spring Boot">Spring Boot</option>
        <option value="Python">Python</option>
        <option value="SQL">SQL</option>
        <option value="React">React</option>
        <option value="Git">Git</option>
        <option value="Machine Learning">Machine Learning</option>
    </select><br><br>

    <button type="submit" style="width: 100%; padding: 10px; background: green; color: white;">Submit Application</button>
</form>

<script>
    document.getElementById('applyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('candidateName').value;
        const selectedOptions = Array.from(document.getElementById('candidateSkills').selectedOptions);
        const skillsString = selectedOptions.map(opt => opt.value).join(', '); // Converts to "Java, SQL"

        await fetch('/api/v1/candidates', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, skills: skillsString })
        });
        alert("Success! You are in the database.");
        e.target.reset();
    });
</script>
</body>
</html>
