<!DOCTYPE html>
<html>
<head>
    <title>Recruiter Dashboard</title>
    <style> body { font-family: sans-serif; padding: 20px; background: #f4f4f4;} .container { max-width: 600px; margin: auto; background: white; padding: 20px; } </style>
</head>
<body>
<div class="container">
    <h2>Recruiter Dashboard: Search Database</h2>
    <label>Select Required Skills for this Job:</label><br>
    <select id="requiredSkills" multiple style="width: 100%; height: 150px;">
        <option value="Java">Java</option>
        <option value="Spring Boot">Spring Boot</option>
        <option value="Python">Python</option>
        <option value="SQL">SQL</option>
        <option value="React">React</option>
        <option value="Git">Git</option>
    </select><br><br>

    <button onclick="searchDatabase()" style="width: 100%; padding: 10px; background: blue; color: white;">Scan Entire Database</button>

    <div id="results" style="margin-top: 20px;"></div>
</div>

<script>
    async function searchDatabase() {
        const selectedOptions = Array.from(document.getElementById('requiredSkills').selectedOptions);
        const requirements = selectedOptions.map(opt => opt.value); // Array of strings

        const response = await fetch('/api/v1/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requirements)
        });

        const rankedCandidates = await response.json();

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        rankedCandidates.forEach((c, index) => {
            resultsDiv.innerHTML += `
                    <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
                        <h3>#${index + 1}: ${c.id} - ${c.score}% Match</h3>
                        <p><strong>Has:</strong> ${c.matchedSkills.join(', ')}</p>
                        <p style="color:red"><strong>Missing:</strong> ${c.missingSkills.join(', ')}</p>
                    </div>
                `;
        });
    }
</script>
</body>
</html>
